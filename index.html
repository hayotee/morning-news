<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0e14">
<title>朝のニュース</title>
<style>
  :root{
    --bg:#0b0e14; --card:#151a23; --card2:#1c2330;
    --text:#e8ecf1; --muted:#9aa6b2; --line:#262d3a;
    --accent:#4c8dff; --accent2:#7b61ff;
    --tag:#243044;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    line-height:1.6; -webkit-font-smoothing:antialiased;
  }
  /* ---- ヘッダー ---- */
  header{
    position:sticky; top:0; z-index:20;
    background:rgba(11,14,20,.85); backdrop-filter:blur(12px);
    padding:calc(env(safe-area-inset-top) + 14px) 16px 0;
    border-bottom:1px solid var(--line);
  }
  .h-row{display:flex; align-items:baseline; justify-content:space-between; gap:8px}
  .h-title{font-size:20px; font-weight:800; letter-spacing:.02em}
  .h-updated{font-size:11px; color:var(--muted); white-space:nowrap}
  .h-right{display:flex; align-items:center; gap:9px}
  .refresh{background:var(--card); border:1px solid var(--line); color:var(--text);
    width:34px; height:34px; border-radius:50%; font-size:17px; cursor:pointer; line-height:1; padding:0}
  .refresh:active{background:var(--card2)}
  .refresh.spin{animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .tabs{display:flex; gap:6px; overflow-x:auto; padding:12px 0 10px; scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{
    flex:0 0 auto; padding:7px 14px; border-radius:999px;
    background:var(--card); color:var(--muted); font-size:13px; font-weight:600;
    border:1px solid var(--line); cursor:pointer; transition:.15s;
  }
  .tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; border-color:transparent}
  /* ---- 一覧 ---- */
  main{padding:14px 16px calc(env(safe-area-inset-bottom) + 40px)}
  .topic{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:13px 14px; margin-bottom:9px; cursor:pointer; transition:.15s;
  }
  .topic:active{transform:scale(.99); background:var(--card2)}
  .topic .meta{display:flex; align-items:center; gap:8px; margin-bottom:7px}
  .topic .cat{
    display:inline-block; font-size:10.5px; font-weight:700; color:var(--accent);
    background:var(--tag); padding:2px 8px; border-radius:6px;
  }
  .topic .date{font-size:11px; color:var(--muted); white-space:nowrap}
  .topic h2{margin:0 0 4px; font-size:15.5px; font-weight:700; line-height:1.4}
  .topic p{margin:0; font-size:13px; color:var(--muted); line-height:1.55}
  .topic .chev{float:right; color:var(--muted); font-size:13px; margin-top:1px}
  /* ---- 詳細（オーバーレイ） ---- */
  .detail{
    position:fixed; inset:0; z-index:50; background:var(--bg);
    transform:translateX(100%); transition:transform .28s cubic-bezier(.4,0,.2,1);
    overflow-y:auto; -webkit-overflow-scrolling:touch;
  }
  .detail.open{transform:translateX(0)}
  .d-bar{
    position:sticky; top:0; background:rgba(11,14,20,.9); backdrop-filter:blur(12px);
    padding:calc(env(safe-area-inset-top) + 12px) 16px 12px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:10px;
  }
  .back{background:none; border:none; color:var(--accent); font-size:15px; font-weight:600; cursor:pointer; padding:4px 2px}
  .d-body{padding:18px 18px calc(env(safe-area-inset-bottom) + 60px)}
  .d-body .cat{display:inline-block; font-size:11px; font-weight:700; color:var(--accent); background:var(--tag); padding:3px 9px; border-radius:6px; margin-bottom:12px}
  .d-body h1{font-size:21px; font-weight:800; line-height:1.4; margin:0 0 8px}
  .d-date{font-size:12.5px; color:var(--muted); margin:0 0 16px}
  .lead{font-size:15px; color:var(--text); background:var(--card); border-left:3px solid var(--accent); padding:12px 14px; border-radius:0 10px 10px 0; margin-bottom:22px}
  .sec{margin-bottom:20px}
  .sec h3{font-size:15px; font-weight:700; margin:0 0 7px; padding-left:10px; border-left:3px solid var(--accent2)}
  .sec p{font-size:14.5px; color:#cfd6df; margin:0}
  .sources{margin-top:28px; border-top:1px solid var(--line); padding-top:18px}
  .sources h4{font-size:13px; color:var(--muted); margin:0 0 10px; font-weight:700}
  .src-link{display:flex; align-items:center; justify-content:space-between; padding:12px 14px; background:var(--card); border:1px solid var(--line); border-radius:10px; margin-bottom:8px; text-decoration:none; color:var(--text); font-size:14px}
  .src-link span.ext{color:var(--muted); font-size:12px}
  .empty{text-align:center; color:var(--muted); padding:60px 20px; font-size:14px}
  .topic .savemark{color:#f0b429; font-size:12px; margin-left:auto}
  /* ---- 詳細アクション ---- */
  .actions{display:flex; flex-wrap:wrap; gap:8px; margin:0 0 20px}
  .act{
    display:inline-flex; align-items:center; gap:5px; padding:8px 12px; border-radius:10px;
    font-size:13px; font-weight:600; border:1px solid var(--line); background:var(--card);
    color:var(--text); cursor:pointer; text-decoration:none;
  }
  .act:active{transform:scale(.97)}
  .act.on{border-color:transparent}
  .act.save.on{background:rgba(240,180,41,.15); color:#f0b429; border-color:rgba(240,180,41,.4)}
  .act.up.on{background:rgba(76,141,255,.18); color:var(--accent); border-color:rgba(76,141,255,.45)}
  .act.down.on{background:rgba(255,107,107,.15); color:#ff6b6b; border-color:rgba(255,107,107,.4)}
  .act.ai{background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; border-color:transparent}
  .ai-label{width:100%; font-size:11px; color:var(--muted); margin:2px 0 -2px}
  .copybar{
    display:flex; gap:8px; align-items:center; justify-content:space-between;
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:12px 14px; margin-bottom:12px; font-size:13px; color:var(--muted);
  }
  .copybar button{
    background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; border:none;
    padding:8px 12px; border-radius:9px; font-size:12.5px; font-weight:700; cursor:pointer; white-space:nowrap;
  }
</style>
</head>
<body>
  <header>
    <div class="h-row">
      <div class="h-title">朝のニュース ☕</div>
      <div class="h-right">
        <span class="h-updated" id="updated"></span>
        <button class="refresh" id="refresh" aria-label="最新データに更新">⟳</button>
      </div>
    </div>
    <div class="tabs" id="tabs"></div>
  </header>

  <main id="list"></main>

  <div class="detail" id="detail">
    <div class="d-bar">
      <button class="back" id="back">‹ 戻る</button>
    </div>
    <div class="d-body" id="detailBody"></div>
  </div>

<script>
const esc = s => String(s??"").replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function fmtDate(s, long){
  if(!s) return '';
  const d = new Date(s + 'T00:00:00+09:00');
  if(isNaN(d)) return esc(s);
  return long
    ? d.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'})
    : (d.getMonth()+1) + '/' + d.getDate();
}
let DATA = null, activeTab = null, currentTopic = null;
const SAVED_KEY='mn_saved', RATE_KEY='mn_rating';
const getJSON=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d}catch(e){return d}};
const setJSON=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const isSaved=id=>getJSON(SAVED_KEY,[]).includes(id);
const getRating=id=>getJSON(RATE_KEY,{})[id]||0;

async function load(){
  try{
    const res = await fetch('news.json?t=' + Date.now());
    DATA = await res.json();
  }catch(e){
    document.getElementById('list').innerHTML =
      '<div class="empty">news.json を読み込めませんでした。<br>ローカルで開く場合は簡易サーバー経由で表示してください。</div>';
    return;
  }
  const d = new Date(DATA.updatedAt);
  document.getElementById('updated').textContent =
    '更新 ' + d.toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  if(!activeTab) activeTab = DATA.tabs[0]?.id;
  renderList();
}

function renderTabs(){
  const savedCount = getJSON(SAVED_KEY,[]).length;
  document.getElementById('tabs').innerHTML =
    DATA.tabs.map(t => `<div class="tab" data-id="${esc(t.id)}">${esc(t.label)}</div>`).join('')
    + `<div class="tab" data-id="__saved__">🔖保存${savedCount?` (${savedCount})`:''}</div>`;
  document.querySelectorAll('.tab').forEach(el =>
    el.onclick = () => { activeTab = el.dataset.id; renderList(); window.scrollTo(0,0); });
  document.querySelectorAll('.tab').forEach(el =>
    el.classList.toggle('active', el.dataset.id === activeTab));
}

function topicCard(tp, tabId){
  return `<div class="topic" data-tab="${esc(tabId)}" data-id="${esc(tp.id)}">
    <span class="chev">›</span>
    <div class="meta">
      ${tp.category ? `<span class="cat">${esc(tp.category)}</span>` : ''}
      ${tp.date ? `<span class="date">${fmtDate(tp.date)}</span>` : ''}
      ${isSaved(tp.id) ? `<span class="savemark">🔖 保存済み</span>` : ''}
    </div>
    <h2>${esc(tp.title)}</h2>
    <p>${esc(tp.summary)}</p>
  </div>`;
}

function renderList(){
  renderTabs();
  const listEl = document.getElementById('list');
  if(activeTab === '__saved__'){
    const saved = getJSON(SAVED_KEY,[]);
    const items = [];
    DATA.tabs.forEach(t => t.topics.forEach(tp => { if(saved.includes(tp.id)) items.push([tp, t.id]); }));
    const cards = items.length
      ? items.map(([tp,tid]) => topicCard(tp,tid)).join('')
      : '<div class="empty">保存した記事はまだありません。<br>記事を開いて「🔖 保存」を押すとここに並びます。</div>';
    listEl.innerHTML =
      `<div class="copybar"><span>評価・保存をAIに渡す用にコピー</span><button onclick="copyPrefs()">コピー</button></div>` + cards;
  } else {
    const tab = DATA.tabs.find(t => t.id === activeTab);
    const topics = tab?.topics || [];
    listEl.innerHTML = topics.length
      ? topics.map(tp => topicCard(tp, activeTab)).join('')
      : '<div class="empty">この時間のトピックはまだありません。</div>';
  }
  document.querySelectorAll('.topic').forEach(el =>
    el.onclick = () => openDetail(el.dataset.tab, el.dataset.id));
}

function findTopic(tabId, topicId){
  let tab = DATA.tabs.find(t => t.id === tabId);
  let tp = tab?.topics.find(x => x.id === topicId);
  if(!tp){
    for(const t of DATA.tabs){ const f = t.topics.find(x => x.id === topicId); if(f){ tp = f; tabId = t.id; break; } }
  }
  return tp ? {tp, tabId} : null;
}

function aiPrompt(tp){
  return `次のニュースについて、背景・要点・なぜ重要か・世間の反応を、初心者にもわかるように詳しく解説してください。\n\nタイトル: ${tp.title}\n概要: ${tp.summary||''}`;
}

function renderDetailBody(){
  const tp = currentTopic.tp;
  const q = encodeURIComponent(aiPrompt(tp));
  const saved = isSaved(tp.id), r = getRating(tp.id);
  document.getElementById('detailBody').innerHTML = `
    ${tp.category ? `<span class="cat">${esc(tp.category)}</span>` : ''}
    <h1>${esc(tp.title)}</h1>
    ${tp.date ? `<div class="d-date">🗓 ${fmtDate(tp.date, true)}</div>` : ''}
    <div class="actions">
      <button class="act save ${saved?'on':''}" onclick="toggleSave('${esc(tp.id)}')">${saved?'🔖 保存済み':'🔖 保存'}</button>
      <button class="act up ${r===1?'on':''}" onclick="rate('${esc(tp.id)}',1)">👍 いい</button>
      <button class="act down ${r===-1?'on':''}" onclick="rate('${esc(tp.id)}',-1)">👎 興味なし</button>
      <div class="ai-label">この記事をAIにもっと詳しく聞く ↓</div>
      <a class="act ai" href="https://claude.ai/new?q=${q}" target="_blank" rel="noopener noreferrer">Claudeに聞く</a>
      <a class="act" href="https://chatgpt.com/?q=${q}" target="_blank" rel="noopener noreferrer">ChatGPTに聞く</a>
      <a class="act" href="https://www.google.com/search?q=${encodeURIComponent(tp.title)}" target="_blank" rel="noopener noreferrer">🔍 検索</a>
    </div>
    ${tp.lead ? `<div class="lead">${esc(tp.lead)}</div>` : ''}
    ${(tp.sections||[]).map(s => `
      <div class="sec"><h3>${esc(s.heading)}</h3><p>${esc(s.body)}</p></div>`).join('')}
    <div class="sources">
      <h4>情報元・ソース</h4>
      ${(tp.sources||[]).map(src => `
        <a class="src-link" href="${esc(src.url)}" target="_blank" rel="noopener noreferrer">
          <span>${esc(src.name)}</span><span class="ext">開く ↗</span></a>`).join('')}
    </div>`;
}

function openDetail(tabId, topicId){
  const f = findTopic(tabId, topicId);
  if(!f) return;
  currentTopic = f;
  renderDetailBody();
  const dt = document.getElementById('detail');
  dt.scrollTop = 0;
  dt.classList.add('open');
  history.pushState({detail:true}, '');
}

function toggleSave(id){
  const arr = getJSON(SAVED_KEY,[]);
  const i = arr.indexOf(id);
  if(i>=0) arr.splice(i,1); else arr.push(id);
  setJSON(SAVED_KEY, arr);
  renderDetailBody();
}

function rate(id, v){
  const m = getJSON(RATE_KEY,{});
  m[id] = (m[id]===v ? 0 : v);
  if(!m[id]) delete m[id];
  setJSON(RATE_KEY, m);
  renderDetailBody();
}

function copyPrefs(){
  const saved = getJSON(SAVED_KEY,[]), m = getJSON(RATE_KEY,{});
  const title = id => { for(const t of DATA.tabs){ const f = t.topics.find(x => x.id===id); if(f) return f.title; } return id; };
  const ups = Object.keys(m).filter(k=>m[k]===1), downs = Object.keys(m).filter(k=>m[k]===-1);
  let out = '【保存した記事】\n' + (saved.length ? saved.map(id=>'・'+title(id)).join('\n') : 'なし');
  out += '\n\n【👍 いい記事】\n' + (ups.length ? ups.map(id=>'・'+title(id)).join('\n') : 'なし');
  out += '\n\n【👎 興味なし】\n' + (downs.length ? downs.map(id=>'・'+title(id)).join('\n') : 'なし');
  const done = () => alert('コピーしました。Claudeに貼り付けて「この傾向で次回キュレーションして」と伝えてください。');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(out).then(done).catch(()=>prompt('コピーして使ってください', out));
  } else { prompt('コピーして使ってください', out); }
}

function closeDetail(){ document.getElementById('detail').classList.remove('open'); }
document.getElementById('back').onclick = () => history.back();
window.onpopstate = () => { closeDetail(); renderList(); };

document.getElementById('refresh').onclick = async () => {
  const btn = document.getElementById('refresh');
  if(btn.classList.contains('spin')) return;
  btn.classList.add('spin');
  const prev = document.getElementById('updated').textContent;
  await load();
  btn.classList.remove('spin');
  const u = document.getElementById('updated');
  const now = u.textContent;
  u.textContent = (now === prev) ? '最新です' : now + '（更新）';
  setTimeout(() => { if(DATA) u.textContent = now; }, 2500);
};

load();
</script>
</body>
</html>
