<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0e14">
<title>朝のニュース</title>
<style>
  :root{
    --bg:#0b0e14; --card:#151a23; --card2:#1c2330;
    --text:#e8ecf1; --muted:#9aa6b2; --line:#262d3a;
    --accent:#4c8dff; --accent2:#7b61ff;
    --tag:#243044;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    line-height:1.6; -webkit-font-smoothing:antialiased;
  }
  /* ---- ヘッダー ---- */
  header{
    position:sticky; top:0; z-index:20;
    background:rgba(11,14,20,.85); backdrop-filter:blur(12px);
    padding:calc(env(safe-area-inset-top) + 14px) 16px 0;
    border-bottom:1px solid var(--line);
  }
  .h-row{display:flex; align-items:baseline; justify-content:space-between; gap:8px}
  .h-title{font-size:20px; font-weight:800; letter-spacing:.02em}
  .h-updated{font-size:11px; color:var(--muted); white-space:nowrap}
  .tabs{display:flex; gap:6px; overflow-x:auto; padding:12px 0 10px; scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{
    flex:0 0 auto; padding:7px 14px; border-radius:999px;
    background:var(--card); color:var(--muted); font-size:13px; font-weight:600;
    border:1px solid var(--line); cursor:pointer; transition:.15s;
  }
  .tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; border-color:transparent}
  /* ---- 一覧 ---- */
  main{padding:14px 16px calc(env(safe-area-inset-bottom) + 40px)}
  .topic{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:13px 14px; margin-bottom:9px; cursor:pointer; transition:.15s;
  }
  .topic:active{transform:scale(.99); background:var(--card2)}
  .topic .meta{display:flex; align-items:center; gap:8px; margin-bottom:7px}
  .topic .cat{
    display:inline-block; font-size:10.5px; font-weight:700; color:var(--accent);
    background:var(--tag); padding:2px 8px; border-radius:6px;
  }
  .topic .date{font-size:11px; color:var(--muted); white-space:nowrap}
  .topic h2{margin:0 0 4px; font-size:15.5px; font-weight:700; line-height:1.4}
  .topic p{margin:0; font-size:13px; color:var(--muted);
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
  .topic .chev{float:right; color:var(--muted); font-size:13px; margin-top:1px}
  /* ---- 詳細（オーバーレイ） ---- */
  .detail{
    position:fixed; inset:0; z-index:50; background:var(--bg);
    transform:translateX(100%); transition:transform .28s cubic-bezier(.4,0,.2,1);
    overflow-y:auto; -webkit-overflow-scrolling:touch;
  }
  .detail.open{transform:translateX(0)}
  .d-bar{
    position:sticky; top:0; background:rgba(11,14,20,.9); backdrop-filter:blur(12px);
    padding:calc(env(safe-area-inset-top) + 12px) 16px 12px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:10px;
  }
  .back{background:none; border:none; color:var(--accent); font-size:15px; font-weight:600; cursor:pointer; padding:4px 2px}
  .d-body{padding:18px 18px calc(env(safe-area-inset-bottom) + 60px)}
  .d-body .cat{display:inline-block; font-size:11px; font-weight:700; color:var(--accent); background:var(--tag); padding:3px 9px; border-radius:6px; margin-bottom:12px}
  .d-body h1{font-size:21px; font-weight:800; line-height:1.4; margin:0 0 8px}
  .d-date{font-size:12.5px; color:var(--muted); margin:0 0 16px}
  .lead{font-size:15px; color:var(--text); background:var(--card); border-left:3px solid var(--accent); padding:12px 14px; border-radius:0 10px 10px 0; margin-bottom:22px}
  .sec{margin-bottom:20px}
  .sec h3{font-size:15px; font-weight:700; margin:0 0 7px; padding-left:10px; border-left:3px solid var(--accent2)}
  .sec p{font-size:14.5px; color:#cfd6df; margin:0}
  .sources{margin-top:28px; border-top:1px solid var(--line); padding-top:18px}
  .sources h4{font-size:13px; color:var(--muted); margin:0 0 10px; font-weight:700}
  .src-link{display:flex; align-items:center; justify-content:space-between; padding:12px 14px; background:var(--card); border:1px solid var(--line); border-radius:10px; margin-bottom:8px; text-decoration:none; color:var(--text); font-size:14px}
  .src-link span.ext{color:var(--muted); font-size:12px}
  .empty{text-align:center; color:var(--muted); padding:60px 20px; font-size:14px}
</style>
</head>
<body>
  <header>
    <div class="h-row">
      <div class="h-title">朝のニュース ☕</div>
      <div class="h-updated" id="updated"></div>
    </div>
    <div class="tabs" id="tabs"></div>
  </header>

  <main id="list"></main>

  <div class="detail" id="detail">
    <div class="d-bar">
      <button class="back" id="back">‹ 戻る</button>
    </div>
    <div class="d-body" id="detailBody"></div>
  </div>

<script>
const esc = s => String(s??"").replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function fmtDate(s, long){
  if(!s) return '';
  const d = new Date(s + 'T00:00:00+09:00');
  if(isNaN(d)) return esc(s);
  return long
    ? d.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'})
    : (d.getMonth()+1) + '/' + d.getDate();
}
let DATA = null, activeTab = null;

async function load(){
  try{
    const res = await fetch('news.json?t=' + Date.now());
    DATA = await res.json();
  }catch(e){
    document.getElementById('list').innerHTML =
      '<div class="empty">news.json を読み込めませんでした。<br>ローカルで開く場合は簡易サーバー経由で表示してください。</div>';
    return;
  }
  const d = new Date(DATA.updatedAt);
  document.getElementById('updated').textContent =
    '更新 ' + d.toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  renderTabs();
  activeTab = DATA.tabs[0]?.id;
  renderList();
}

function renderTabs(){
  document.getElementById('tabs').innerHTML = DATA.tabs.map(t =>
    `<div class="tab" data-id="${esc(t.id)}">${esc(t.label)}</div>`).join('');
  document.querySelectorAll('.tab').forEach(el =>
    el.onclick = () => { activeTab = el.dataset.id; renderList(); });
}

function renderList(){
  document.querySelectorAll('.tab').forEach(el =>
    el.classList.toggle('active', el.dataset.id === activeTab));
  const tab = DATA.tabs.find(t => t.id === activeTab);
  const topics = tab?.topics || [];
  document.getElementById('list').innerHTML = topics.length ? topics.map(tp => `
    <div class="topic" data-tab="${esc(activeTab)}" data-id="${esc(tp.id)}">
      <span class="chev">›</span>
      <div class="meta">
        ${tp.category ? `<span class="cat">${esc(tp.category)}</span>` : ''}
        ${tp.date ? `<span class="date">${fmtDate(tp.date)}</span>` : ''}
      </div>
      <h2>${esc(tp.title)}</h2>
      <p>${esc(tp.summary)}</p>
    </div>`).join('') : '<div class="empty">この時間のトピックはまだありません。</div>';
  document.querySelectorAll('.topic').forEach(el =>
    el.onclick = () => openDetail(el.dataset.tab, el.dataset.id));
}

function openDetail(tabId, topicId){
  const tab = DATA.tabs.find(t => t.id === tabId);
  const tp = tab?.topics.find(x => x.id === topicId);
  if(!tp) return;
  document.getElementById('detailBody').innerHTML = `
    ${tp.category ? `<span class="cat">${esc(tp.category)}</span>` : ''}
    <h1>${esc(tp.title)}</h1>
    ${tp.date ? `<div class="d-date">🗓 ${fmtDate(tp.date, true)}</div>` : ''}
    ${tp.lead ? `<div class="lead">${esc(tp.lead)}</div>` : ''}
    ${(tp.sections||[]).map(s => `
      <div class="sec"><h3>${esc(s.heading)}</h3><p>${esc(s.body)}</p></div>`).join('')}
    <div class="sources">
      <h4>情報元・ソース</h4>
      ${(tp.sources||[]).map(src => `
        <a class="src-link" href="${esc(src.url)}" target="_blank" rel="noopener noreferrer">
          <span>${esc(src.name)}</span><span class="ext">開く ↗</span></a>`).join('')}
    </div>`;
  const dt = document.getElementById('detail');
  dt.scrollTop = 0;
  dt.classList.add('open');
  history.pushState({detail:true}, '');
}

function closeDetail(){ document.getElementById('detail').classList.remove('open'); }
document.getElementById('back').onclick = () => history.back();
window.onpopstate = () => closeDetail();

load();
</script>
</body>
</html>
